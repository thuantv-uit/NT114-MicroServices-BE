name: MicroService CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  # ============================================================
  # USER SERVICE
  # ============================================================
  user-service:
    name: User Service - Build & Push
    needs: detect-changes
    if: ${{ github.event_name == 'push' && contains(needs.detect-changes.outputs.services_json, 'user-service') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        run: |
          docker build -t thuan410/user-service:latest \
                       -t thuan410/user-service:${{ github.sha }} \
                       ./user-service
          docker push thuan410/user-service:latest
          docker push thuan410/user-service:${{ github.sha }}

  # ============================================================
  # BOARD SERVICE
  # ============================================================
  board-service:
    name: Board Service - Build & Push
    needs: detect-changes
    if: ${{ github.event_name == 'push' && contains(needs.detect-changes.outputs.services_json, 'board-service') }}
