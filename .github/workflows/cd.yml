name: MicroService CD

on:
  push:
    branches: [production]

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  deploy:
    name: Deploy to VPS
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write env files
        run: |
          mkdir -p envs
          echo "${{ secrets.ENV_USER_SERVICE }}"         > envs/user-service.env
          echo "${{ secrets.ENV_BOARD_SERVICE }}"        > envs/board-service.env
          echo "${{ secrets.ENV_COLUMN_SERVICE }}"       > envs/column-service.env
          echo "${{ secrets.ENV_CARD_SERVICE }}"         > envs/card-service.env
          echo "${{ secrets.ENV_NOTIFICATION_SERVICE }}" > envs/notification-service.env

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "docker-compose.prod.yml,envs/"
          target: /home/thuantv/project/

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/thuantv/project

            docker network create shared-network 2>/dev/null || true

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

            echo "✅ All services deployed!"