name: MicroService CD

on:
  push:
    branches: [production]

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yml

  # ============================================================
  # USER SERVICE
  # ============================================================
  user-service:
    name: User Service - Deploy
    needs: detect-changes
    if: ${{ contains(needs.detect-changes.outputs.services_json, 'user-service') }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            docker network create microservice-network 2>/dev/null || true
            mkdir -p /home/thuantv/project/envs

            cat > /home/thuantv/project/envs/user-service.env << 'EOF'
            ${{ secrets.ENV_USER_SERVICE }}
            EOF

            docker pull thuan410/user-service:${{ github.sha }}
            docker stop user-service || true
            docker rm user-service || true
            docker run -d \
              --name user-service \
              --restart unless-stopped \
              --network microservice-network \
              -p 3001:3001 \
              --env-file /home/thuantv/project/envs/user-service.env \
              thuan410/user-service:${{ github.sha }}
            echo "✅ user-service deployed!"

